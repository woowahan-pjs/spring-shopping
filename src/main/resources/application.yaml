spring:
  application:
    name: spring-shopping
  datasource:
    url: jdbc:h2:mem:shopping;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:   # 빈 문자열.
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:bG9jYWwtZGV2LXNlY3JldC1rZXktbWluaW11bS0zMi1jaGFyYWN0ZXJz}
  expiration-ms: 3600000