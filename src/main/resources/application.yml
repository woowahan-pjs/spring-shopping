spring:
  application:
    name: spring-shopping
  cloud:
    openfeign:
      client:
        config:
          purgomalum:
            connectTimeout: 3000
            readTimeout: 3000
  datasource:
    url: jdbc:h2:mem:spring-shopping;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  auth:
    jwt-secret: ${JWT_SECRET:qwpWIyUDDe9xAAVPDgCXdzA4neO213WBgV3OjERKsWtp/1g/PYFSdyG8/rvhJ7PnAsCSJE99w3gp7q5vZcwzgg}
    token-validity-minutes: 30
    refresh-token-validity-days: 7
    refresh-token-cookie-name: refreshToken
    refresh-token-cookie-secure: true
  slang:
    purgomalum:
      base-url: ${PURGOMALUM_BASE_URL:https://www.purgomalum.com}
    korean:
      rules-location: ${KOREAN_SLANG_RULES_LOCATION:classpath:slang/korean-rules.csv}
