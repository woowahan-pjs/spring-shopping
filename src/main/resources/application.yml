spring:
  application:
    name: spring-shopping

  datasource:
    url: jdbc:mysql://localhost:3306/spring_shopping?serverTimezone=Asia/Seoul
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
