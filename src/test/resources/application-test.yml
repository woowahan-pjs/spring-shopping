spring:
  datasource:
    url: jdbc:h2:mem:coreDB;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 5
      pool-name: core-db-pool
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create
    properties:
      hibernate:
        format_sql: false
        show_sql: false
  flyway:
    enabled: false
  sql:
    init:
      mode: never

security:
  jwt:
    token:
      secret-key: jwt-secret-key-for-test-12345678901234567890
      access:
        expire-length: 3600000 # 1시간